services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:/app/data/minlluminati.db"
      # 도메인 사용 시 실제 URL로 변경 (예: https://yourdomain.com)
      # Cloudflare Tunnel / ngrok 사용 시에도 외부 접속 URL로 설정 필요
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@minlluminati.local}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-changeme123}"
      # 선택: 구글 로그인
      # GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      # GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
    volumes:
      - db_data:/app/data
      - uploads:/app/public/uploads
    restart: unless-stopped
    # Cloudflare Tunnel 사용 시 ports 노출 필요 없이 아래처럼 변경 가능
    # network_mode: bridge

volumes:
  db_data:
  uploads:
