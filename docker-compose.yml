services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:/app/data/minlluminati.db"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-minlluminati-secret-key-change-in-prod}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@minlluminati.local}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-changeme123}"
    volumes:
      - db_data:/app/data
      - uploads:/app/public/uploads
    restart: unless-stopped

volumes:
  db_data:
  uploads:
